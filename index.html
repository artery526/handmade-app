<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily 手作工坊 | Handmade with Love</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #66503e;
      --muted: #9a806c;
      --line: rgba(166, 126, 94, 0.24);
      --paper: rgba(255, 250, 243, 0.9);
      --paper-solid: #fff8ef;
      --blush: #eeb9a4;
      --rose: #c98273;
      --sage: #7c8f65;
      --cream: #f6e4d2;
      --shadow: 0 18px 50px rgba(109, 77, 53, 0.16);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif TC", serif;
      color: var(--ink);
      background: #fff7ee;
    }

    a { color: inherit; }

    button, input {
      font: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: rgba(255, 248, 239, 0.76);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1;
      min-width: 0;
      margin-left: -14px;
      padding: 7px 0 4px 14px;
      text-decoration: none;
      overflow: visible;
    }

    .brand strong {
      display: flex;
      align-items: baseline;
      gap: 8px;
      white-space: nowrap;
    }

    .brand-emily {
      font-family: "Dancing Script", cursive;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0;
      background: linear-gradient(110deg, #8d6850 0%, #c98273 46%, #6f533f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 4px 18px rgba(161, 102, 78, 0.18);
    }

    .brand-cn {
      color: #6d503d;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(109,80,61,0.12);
    }

    .brand-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-family: "Noto Sans TC", sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .pill-link, .cart-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.54);
      color: var(--ink);
      min-height: 40px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(109, 77, 53, 0.08);
    }

    .cart-button {
      background: var(--ink);
      color: #fffaf4;
      border-color: transparent;
      gap: 8px;
    }

    .cart-count {
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fffaf4;
      color: var(--ink);
      font-family: "Noto Sans TC", sans-serif;
      font-size: 12px;
      font-weight: 700;
    }

    .hero {
      width: 100%;
      margin: 0 auto;
      overflow: hidden;
      background: #fff7ee;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: auto;
    }

    main {
      background: linear-gradient(180deg, #fffaf4 0%, #fff8ef 58%, #fff4e8 100%);
    }

    .section {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 46px 0;
    }

    .section-centered {
      text-align: center;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .section-head-centered {
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .section-title h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: 0.12em;
    }

    .section-title p {
      margin: 0;
      color: var(--muted);
      font-family: "Noto Sans TC", sans-serif;
      line-height: 1.8;
    }

    .sheet-status {
      color: var(--muted);
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      white-space: nowrap;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .category-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 14px 38px rgba(109, 77, 53, 0.1);
      padding: 14px;
    }

    .category-image, .popular-image, .story-photo, .story-flower {
      background-image: url("assets/emily-hero-wide.png");
      background-size: 250% auto;
      background-repeat: no-repeat;
    }

    .category-image, .category-video {
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid rgba(166, 126, 94, 0.16);
    }

    .category-video {
      width: 100%;
      object-fit: cover;
      display: block;
      background: #fff4e8;
    }

    .crop-bouquet { background-position: 5% 42%; }
    .crop-coaster { background-position: 66% 58%; }
    .crop-hairtie { background-position: 97% 48%; }
    .crop-story { background-position: 24% 72%; }
    .crop-flower { background-position: 92% 62%; }

    .category-card h3 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.08em;
    }

    .category-en {
      margin-top: 4px;
      color: var(--rose);
      font-family: "Dancing Script", cursive;
      font-size: 19px;
    }

    .category-card p {
      margin: 12px 0 16px;
      color: #806852;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 14px;
      line-height: 1.75;
    }

    .category-link, .more-link {
      min-height: 38px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.64);
      color: var(--ink);
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 14px;
      font-weight: 700;
    }

    .popular-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .popular-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 14px 36px rgba(109, 77, 53, 0.09);
      text-align: left;
    }

    .popular-rank {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #eda68b;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 800;
      font-size: 13px;
      box-shadow: 0 8px 18px rgba(237, 166, 139, 0.32);
    }

    .popular-image {
      aspect-ratio: 4 / 3;
      background-size: 270% auto;
      border-bottom: 1px solid var(--line);
    }

    .popular-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .popular-body {
      padding: 14px 16px 16px;
    }

    .popular-body h3 {
      margin: 0 0 6px;
      font-size: 17px;
      line-height: 1.4;
    }

    .popular-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .heart-button {
      border: 0;
      background: transparent;
      color: var(--rose);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }

    .heart-button[disabled] {
      color: #d8c7b8;
      cursor: not-allowed;
    }

    .story-panel {
      display: grid;
      grid-template-columns: 1fr 1.25fr 0.8fr;
      gap: 26px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 14px 42px rgba(109, 77, 53, 0.1);
      padding: 18px;
    }

    .story-photo, .story-flower {
      min-height: 210px;
      border-radius: 8px;
      border: 1px solid rgba(166, 126, 94, 0.16);
    }

    .story-copy h2 {
      margin: 0 0 14px;
      font-size: clamp(24px, 3vw, 36px);
      letter-spacing: 0.08em;
    }

    .story-copy p {
      margin: 0;
      color: #7a6250;
      font-family: "Noto Sans TC", sans-serif;
      line-height: 1.95;
    }

    .story-values {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .story-values span {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--muted);
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      text-align: center;
    }

    .filters {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 22px;
    }

    .filter {
      flex: 0 0 auto;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.64);
      color: var(--ink);
      padding: 0 16px;
      cursor: pointer;
    }

    .filter.active {
      background: var(--sage);
      border-color: transparent;
      color: #fff;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .product-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 14px 38px rgba(109, 77, 53, 0.1);
    }

    .product-image {
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #f9e7d8, #f7f0e6);
      position: relative;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      background:
        radial-gradient(circle at 25% 25%, rgba(238,185,164,0.28), transparent 28%),
        linear-gradient(135deg, #fff5ea, #f0eadc);
    }

    .product-body {
      padding: 18px;
    }

    .product-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .product-title {
      margin: 0;
      font-size: 21px;
      line-height: 1.45;
    }

    .product-desc {
      min-height: 54px;
      margin: 10px 0 16px;
      color: #806852;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 14px;
      line-height: 1.75;
    }

    .product-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .price {
      color: var(--rose);
      font-family: "Noto Sans TC", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .add-button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 16px;
      background: var(--ink);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    .add-button[disabled] {
      background: #d8c7b8;
      cursor: not-allowed;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 38px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.56);
      font-family: "Noto Sans TC", sans-serif;
    }

    .planning-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 12px 34px rgba(109, 77, 53, 0.09);
      padding: 22px;
    }

    .panel h3 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .panel p, .panel li {
      color: #7a6250;
      font-family: "Noto Sans TC", sans-serif;
      line-height: 1.85;
    }

    .panel ul {
      margin: 0;
      padding-left: 20px;
    }

    .schema {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .schema code {
      display: block;
      padding: 9px 10px;
      border-radius: 8px;
      background: rgba(246, 228, 210, 0.62);
      color: #725943;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
    }

    .cart-drawer {
      position: fixed;
      inset: 0 0 0 auto;
      width: min(420px, 100%);
      transform: translateX(102%);
      transition: transform 0.24s ease;
      z-index: 60;
      background: #fffaf4;
      border-left: 1px solid var(--line);
      box-shadow: -20px 0 45px rgba(64, 46, 34, 0.18);
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.open {
      transform: translateX(0);
    }

    .cart-head {
      padding: 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .cart-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.76);
      color: var(--ink);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    .cart-list {
      flex: 1;
      overflow: auto;
      padding: 18px 22px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .cart-item strong {
      font-size: 16px;
    }

    .cart-item span {
      color: var(--muted);
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
    }

    .remove-button {
      grid-row: span 2;
      align-self: center;
      border: 0;
      background: transparent;
      color: var(--rose);
      cursor: pointer;
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 700;
    }

    .cart-footer {
      padding: 18px 22px 22px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.48);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 700;
      font-size: 18px;
    }

    .copy-order {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--rose);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      z-index: 80;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      padding: 12px 18px;
      font-family: "Noto Sans TC", sans-serif;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 900px) {
      .category-grid, .products, .popular-grid, .planning-grid, .story-panel {
        grid-template-columns: 1fr;
      }

      .story-values {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .story-flower {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .nav {
        width: min(100% - 24px, 1120px);
        height: 62px;
      }

      .brand strong {
        gap: 6px;
      }

      .brand-emily {
        font-size: 27px;
      }

      .brand-cn {
        font-size: 14px;
        letter-spacing: 0.08em;
      }

      .brand-sub {
        display: none;
      }

      .cart-button {
        min-height: 38px;
        padding: 0 12px;
      }

      .section {
        width: min(100% - 24px, 1120px);
      }

      .section-head {
        display: block;
      }

      .sheet-status {
        margin-top: 10px;
        white-space: normal;
      }

      .product-foot {
        align-items: stretch;
        flex-direction: column;
      }

      .add-button {
        width: 100%;
      }

      .schema {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="主選單">
      <a class="brand" href="#top" aria-label="回到 Emily 手作工坊首頁">
        <strong><span class="brand-emily">Emily</span><span class="brand-cn">手作工坊</span></strong>
        <span class="brand-sub">Handmade with Love</span>
      </a>
      <div class="nav-actions">
        <button class="cart-button" type="button" id="openCart">
          購物清單 <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </nav>
  </header>

  <section class="hero" id="top" aria-label="Emily 手作工坊主視覺">
    <img class="hero-image" src="assets/emily-hero-wide.png" alt="Emily 手作工坊主視覺">
  </section>

  <main>
    <section class="section section-centered" id="categories">
      <div class="section-head section-head-centered">
        <div class="section-title">
          <h2>商品分類</h2>
          <p>用心手作，為生活增添溫度</p>
        </div>
        <div class="sheet-status" id="sheetStatus">正在讀取試算表...</div>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section class="section section-centered" id="popular">
      <div class="section-head section-head-centered">
        <div class="section-title">
          <h2>本月人氣作品</h2>
          <p>大家都喜歡的手作小物</p>
        </div>
      </div>
      <div class="popular-grid" id="popularGrid"></div>
    </section>

    <section class="section" id="story">
      <div class="story-panel">
        <div class="story-photo" aria-hidden="true"></div>
        <div class="story-copy">
          <h2>關於 Emily 手作工坊</h2>
          <p>每一針、每一線，都是用心慢慢編織而成。希望收到作品的人，能感受到手作的溫度，在忙碌的生活中，擁有片刻的療癒與美好。</p>
          <div class="story-values">
            <span>純手工製作</span>
            <span>嚴選優質材料</span>
            <span>用心包裝出貨</span>
            <span>客製化服務</span>
          </div>
        </div>
        <div class="story-flower" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <aside class="cart-drawer" id="cartDrawer" aria-label="購物清單" aria-hidden="true">
    <div class="cart-head">
      <h2>購物清單</h2>
      <button class="icon-button" type="button" id="closeCart" aria-label="關閉購物清單">×</button>
    </div>
    <div class="cart-list" id="cartList"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>預估小計</span>
        <span id="cartTotal">NT$0</span>
      </div>
      <button class="copy-order" type="button" id="copyOrder">複製詢問內容</button>
    </div>
  </aside>
  <div class="toast" id="toast"></div>

  <script>
    const SHEET_ID = "1wYmYKcggwnXcpCMUF--Pl0Hwi70UaQ5OhvM4Ob4yg8w";
    const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    const sampleProducts = [
      {
        id: "sample-bouquet",
        listed: true,
        category: "編織花束",
        name: "暖粉玫瑰花束",
        price: 1280,
        stock: 2,
        status: "可詢問",
        image: "",
        description: "適合生日、紀念日和溫柔告白的永生感編織花束。",
        spec: "可客製主色",
        sort: 10
      },
      {
        id: "sample-coaster",
        listed: true,
        category: "編織杯墊",
        name: "小雛菊杯墊組",
        price: 320,
        stock: 6,
        status: "現貨",
        image: "",
        description: "花朵造型杯墊，適合咖啡杯、香氛杯和辦公桌小角落。",
        spec: "一組 2 入",
        sort: 20
      },
      {
        id: "sample-hairtie",
        listed: true,
        category: "編織髮圈",
        name: "春日花圈髮束",
        price: 260,
        stock: 5,
        status: "現貨",
        image: "",
        description: "柔和花色搭配日常穿搭，也適合作為小禮物。",
        spec: "多色可選",
        sort: 30
      },
      {
        id: "sample-flower-coaster",
        listed: true,
        category: "編織杯墊",
        name: "花朵編織杯墊",
        price: 160,
        stock: 8,
        status: "現貨",
        image: "",
        description: "粉嫩花朵造型，讓日常茶席多一點療癒感。",
        spec: "單入",
        sort: 40
      }
    ];

    const categoryCards = [
      {
        category: "編織花束",
        en: "Crochet Bouquet",
        description: "溫暖送禮首選，傳遞心意的花",
        crop: "crop-bouquet",
        video: "flower.mp4"
      },
      {
        category: "編織杯墊",
        en: "Crochet Coaster",
        description: "實用又療癒，點亮每個角落",
        crop: "crop-coaster"
      },
      {
        category: "編織髮圈",
        en: "Crochet Hair Tie",
        description: "多款造型，為日常增添可愛",
        crop: "crop-hairtie"
      }
    ];

    let products = [];
    let activeCategory = "全部";
    let cart = [];

    const categoryGrid = document.getElementById("categoryGrid");
    const popularGrid = document.getElementById("popularGrid");
    const sheetStatus = document.getElementById("sheetStatus");
    const cartDrawer = document.getElementById("cartDrawer");
    const cartList = document.getElementById("cartList");
    const cartCount = document.getElementById("cartCount");
    const cartTotal = document.getElementById("cartTotal");
    const toast = document.getElementById("toast");

    function normalizeHeader(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, "");
    }

    function pick(row, names) {
      for (const name of names) {
        const key = Object.keys(row).find(k => normalizeHeader(k) === normalizeHeader(name));
        if (key && row[key] !== undefined) return String(row[key]).trim();
      }
      return "";
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let quoted = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (quoted) {
          if (char === '"' && next === '"') {
            value += '"';
            i += 1;
          } else if (char === '"') {
            quoted = false;
          } else {
            value += char;
          }
        } else if (char === '"') {
          quoted = true;
        } else if (char === ",") {
          row.push(value);
          value = "";
        } else if (char === "\n") {
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else if (char !== "\r") {
          value += char;
        }
      }
      row.push(value);
      rows.push(row);
      return rows.filter(r => r.some(cell => String(cell).trim()));
    }

    function rowsToProducts(rows) {
      if (rows.length < 2) return [];
      const headers = rows[0].map(h => String(h).trim());
      return rows.slice(1).map((cells, index) => {
        const row = Object.fromEntries(headers.map((h, i) => [h, cells[i] || ""]));
        const listedText = pick(row, ["上架", "公開", "顯示", "listed"]);
        const listed = !listedText || !["否", "no", "false", "0", "下架"].includes(listedText.toLowerCase());
        const priceText = pick(row, ["價格", "售價", "price"]).replace(/[^\d.]/g, "");
        const stockText = pick(row, ["庫存", "數量", "stock"]).replace(/[^\d-]/g, "");
        return {
          id: pick(row, ["編號", "id", "sku"]) || `sheet-${index}`,
          listed,
          category: pick(row, ["分類", "類別", "category"]) || "未分類",
          name: pick(row, ["名稱", "商品名稱", "作品名稱", "name"]) || "未命名作品",
          price: Number(priceText) || 0,
          stock: stockText === "" ? 1 : Number(stockText),
          status: pick(row, ["狀態", "販售狀態", "status"]) || "可詢問",
          image: normalizeImageUrl(pick(row, ["圖片", "照片", "圖片網址", "image", "imageurl"])),
          description: pick(row, ["描述", "說明", "介紹", "description"]),
          spec: pick(row, ["規格", "尺寸", "備註", "spec"]),
          sort: Number(pick(row, ["排序", "sort"])) || 999
        };
      }).filter(item => item.listed && item.name);
    }

    function normalizeImageUrl(url) {
      const raw = String(url || "").trim();
      const driveMatch = raw.match(/drive\.google\.com\/file\/d\/([^/]+)/);
      if (driveMatch) return `https://drive.google.com/uc?export=view&id=${driveMatch[1]}`;
      const openMatch = raw.match(/[?&]id=([^&]+)/);
      if (raw.includes("drive.google.com") && openMatch) return `https://drive.google.com/uc?export=view&id=${openMatch[1]}`;
      return raw;
    }

    function formatPrice(value) {
      return `NT$${Number(value || 0).toLocaleString("zh-TW")}`;
    }

    async function loadProducts() {
      try {
        const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
        const text = await response.text();
        const sheetProducts = rowsToProducts(parseCsv(text));
        if (sheetProducts.length) {
          products = sheetProducts.sort((a, b) => a.sort - b.sort || a.name.localeCompare(b.name, "zh-Hant"));
          sheetStatus.textContent = `已讀取 ${products.length} 件試算表作品`;
        } else {
          products = sampleProducts;
          sheetStatus.textContent = "試算表目前沒有商品資料，先顯示示範品項";
        }
      } catch (error) {
        products = sampleProducts;
        sheetStatus.textContent = "暫時讀不到試算表，先顯示示範品項";
      }
      renderCategories();
      renderPopularProducts();
    }

    function renderCategories() {
      categoryGrid.innerHTML = categoryCards.map(card => `
        <article class="category-card">
          ${card.video
            ? `<video class="category-video" src="${escapeAttr(card.video)}" autoplay muted loop playsinline preload="metadata" aria-label="${escapeAttr(card.category)}動態展示"></video>`
            : `<div class="category-image ${card.crop}" aria-hidden="true"></div>`}
          <h3>${escapeHtml(card.category)}</h3>
          <div class="category-en">${escapeHtml(card.en)}</div>
          <p>${escapeHtml(card.description)}</p>
          <a class="category-link" href="#popular">查看作品 →</a>
        </article>
      `).join("");
    }

    function visualCropForCategory(category, index = 0) {
      if (String(category).includes("花束")) return "crop-bouquet";
      if (String(category).includes("杯墊")) return index % 2 ? "crop-story" : "crop-coaster";
      if (String(category).includes("髮圈")) return "crop-hairtie";
      return ["crop-bouquet", "crop-coaster", "crop-hairtie", "crop-story"][index % 4];
    }

    function renderPopularProducts() {
      const visible = products.slice(0, 4);
      if (!visible.length) {
        popularGrid.innerHTML = '<div class="empty">目前還沒有可顯示的人氣作品。</div>';
        return;
      }

      popularGrid.innerHTML = visible.map((item, index) => {
        const soldOut = Number(item.stock) <= 0 || item.status.includes("售完");
        const crop = visualCropForCategory(item.category, index);
        const imageHtml = item.image
          ? `<img src="${escapeAttr(item.image)}" alt="${escapeAttr(item.name)}" loading="lazy" onerror="this.parentElement.classList.add('${crop}');this.remove()">`
          : "";
        return `
          <article class="popular-card">
            <div class="popular-rank">NO.${index + 1}</div>
            <div class="popular-image ${item.image ? "" : crop}">
              ${imageHtml}
            </div>
            <div class="popular-body">
              <h3>${escapeHtml(item.name)}</h3>
              <div class="popular-foot">
                <div class="price">${formatPrice(item.price)}</div>
                <button class="heart-button" type="button" data-id="${escapeAttr(item.id)}" ${soldOut ? "disabled" : ""} aria-label="加入 ${escapeAttr(item.name)} 到購物清單">♡</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      popularGrid.querySelectorAll(".heart-button:not([disabled])").forEach(button => {
        button.addEventListener("click", () => addToCart(button.dataset.id));
      });
    }

    function renderFilters() {
      const categories = ["全部", ...new Set(products.map(item => item.category).filter(Boolean))];
      filters.innerHTML = categories.map(category => `
        <button class="filter ${category === activeCategory ? "active" : ""}" type="button" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>
      `).join("");
      filters.querySelectorAll(".filter").forEach(button => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          renderFilters();
          renderProducts();
        });
      });
    }

    function renderProducts() {
      const visible = activeCategory === "全部"
        ? products
        : products.filter(item => item.category === activeCategory);

      if (!visible.length) {
        productGrid.innerHTML = '<div class="empty">這個分類目前還沒有作品。</div>';
        return;
      }

      productGrid.innerHTML = visible.map(item => {
        const soldOut = Number(item.stock) <= 0 || item.status.includes("售完");
        return `
          <article class="product-card">
            <div class="product-image">
              ${item.image
                ? `<img src="${escapeAttr(item.image)}" alt="${escapeAttr(item.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="product-placeholder" style="display:none">${escapeHtml(item.category)}</div>`
                : `<div class="product-placeholder">${escapeHtml(item.category)}</div>`}
            </div>
            <div class="product-body">
              <div class="product-meta">
                <span>${escapeHtml(item.category)}</span>
                <span>${escapeHtml(item.status || "可詢問")}</span>
              </div>
              <h3 class="product-title">${escapeHtml(item.name)}</h3>
              <p class="product-desc">${escapeHtml(item.description || item.spec || "手作作品資訊整理中，歡迎先加入詢問清單。")}</p>
              <div class="product-foot">
                <div class="price">${formatPrice(item.price)}</div>
                <button class="add-button" type="button" data-id="${escapeAttr(item.id)}" ${soldOut ? "disabled" : ""}>${soldOut ? "已售完" : "加入詢問"}</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      productGrid.querySelectorAll(".add-button:not([disabled])").forEach(button => {
        button.addEventListener("click", () => addToCart(button.dataset.id));
      });
    }

    function addToCart(id) {
      const item = products.find(product => product.id === id);
      if (!item) return;
      const existing = cart.find(product => product.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ ...item, qty: 1 });
      }
      renderCart();
      showToast("已加入詢問清單");
    }

    function renderCart() {
      const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      cartCount.textContent = totalQty;
      cartTotal.textContent = formatPrice(total);

      if (!cart.length) {
        cartList.innerHTML = '<div class="empty">先把喜歡的作品加入詢問清單。</div>';
        return;
      }

      cartList.innerHTML = cart.map(item => `
        <div class="cart-item">
          <strong>${escapeHtml(item.name)}</strong>
          <button class="remove-button" type="button" data-id="${escapeAttr(item.id)}">移除</button>
          <span>${escapeHtml(item.category)} / ${formatPrice(item.price)} × ${item.qty}</span>
        </div>
      `).join("");

      cartList.querySelectorAll(".remove-button").forEach(button => {
        button.addEventListener("click", () => {
          cart = cart.filter(item => item.id !== button.dataset.id);
          renderCart();
        });
      });
    }

    function buildOrderText() {
      if (!cart.length) return "您好，我想詢問 Emily 手作工坊的作品。";
      const lines = cart.map((item, index) => `${index + 1}. ${item.name} x ${item.qty} - ${formatPrice(item.price * item.qty)}`);
      return [
        "您好，我想詢問 Emily 手作工坊的作品：",
        ...lines,
        `預估小計：${cartTotal.textContent}`,
        "想請問是否還能訂購，以及取貨/寄送方式，謝謝。"
      ].join("\n");
    }

    async function copyOrder() {
      const text = buildOrderText();
      try {
        await navigator.clipboard.writeText(text);
        showToast("詢問內容已複製");
      } catch (error) {
        window.prompt("複製詢問內容", text);
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    document.getElementById("openCart").addEventListener("click", () => {
      cartDrawer.classList.add("open");
      cartDrawer.setAttribute("aria-hidden", "false");
    });

    document.getElementById("closeCart").addEventListener("click", () => {
      cartDrawer.classList.remove("open");
      cartDrawer.setAttribute("aria-hidden", "true");
    });

    document.getElementById("copyOrder").addEventListener("click", copyOrder);
    renderCart();
    loadProducts();
  </script>
</body>
</html>
